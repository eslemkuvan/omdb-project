<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OMDB Movie Search</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-blur bg-blur--one"></div>
  <div class="bg-blur bg-blur--two"></div>

  <div class="page-shell">
    <header class="hero">
      <div class="hero__badge">
        <i class="fa-solid fa-film"></i>
        <span>i2i Systems Internship Project</span>
      </div>

      <h1>Find Movies Instantly</h1>
      <p class="hero__text">
        Search any movie and view its main details in a clean, modern and responsive interface.
      </p>
    </header>

    <main class="container">
      <section class="search-panel">
        <form id="searchForm" class="search-form">
          <label class="search-label" for="movieInput">Movie name</label>

          <div class="search-row">
            <div class="input-wrap">
              <i class="fa-solid fa-magnifying-glass input-icon"></i>
              <input
                id="movieInput"
                type="text"
                placeholder="Enter a movie title..."
                autocomplete="off"
                required
              />
            </div>

            <button type="submit" id="searchButton" class="search-btn">
              <i class="fa-solid fa-magnifying-glass"></i>
              <span>Search</span>
            </button>
          </div>
        </form>

        <div class="quick-searches">
          <span class="quick-searches__label">Popular searches</span>
          <button type="button" class="chip" data-title="Inception">Inception</button>
          <button type="button" class="chip" data-title="Interstellar">Interstellar</button>
          <button type="button" class="chip" data-title="The Matrix">The Matrix</button>
          <button type="button" class="chip" data-title="Parasite">Parasite</button>
        </div>
      </section>

      <section class="status-panel" aria-live="polite">
        <p id="message" class="message hidden"></p>
      </section>

      <section id="movieCard" class="movie-card hidden">
        <div class="movie-card__poster-wrap">
          <img id="moviePoster" src="" alt="Movie poster" class="movie-card__poster" />
        </div>

        <div class="movie-card__content">
          <div class="movie-card__header">
            <div>
              <p class="card-label">Movie Details</p>
              <h2 id="movieTitle">Title</h2>
            </div>
            <span id="movieYear" class="year-badge">Year</span>
          </div>

          <div class="detail-grid">
            <div class="detail-item">
              <span class="detail-key">
                <i class="fa-solid fa-layer-group"></i>
                Genre
              </span>
              <span id="movieGenre" class="detail-value">-</span>
            </div>

            <div class="detail-item">
              <span class="detail-key">
                <i class="fa-solid fa-user-tie"></i>
                Director
              </span>
              <span id="movieDirector" class="detail-value">-</span>
            </div>

            <div class="detail-item">
              <span class="detail-key">
                <i class="fa-solid fa-star"></i>
                IMDb Rating
              </span>
              <span id="movieRating" class="detail-value">-</span>
            </div>

            <div class="detail-item">
              <span class="detail-key">
                <i class="fa-solid fa-clock"></i>
                Runtime
              </span>
              <span id="movieRuntime" class="detail-value">-</span>
            </div>
          </div>

          <div class="plot-box">
            <span class="detail-key">
              <i class="fa-solid fa-book-open"></i>
              Plot
            </span>
            <p id="moviePlot" class="plot-text">-</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
